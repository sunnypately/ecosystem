/* ------------------------------------------------------------------ */
/*  CACHE + RATE-LIMITED FETCH QUEUE (Finnhub free tier: 60/min)      */
/* ------------------------------------------------------------------ */
const cache = {};
const getCache = (k) => { const e = cache[k]; return (e && e.exp > Date.now()) ? e.data : null; };
const setCache = (k, d, ttl) => { cache[k] = { data: d, exp: Date.now() + ttl }; };
const clearCache = () => { for (const k in cache) delete cache[k]; };
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

/* Concurrent rolling-window scheduler.
   Finnhub free tier allows ~60 calls/min. Instead of a fixed 1.1s gap (which
   serialized everything and took >60s to fill the grid), we fire calls in
   parallel — capped at MAX_PER_WINDOW starts per 60s and spaced by MIN_SPACING
   to avoid burst limits. Network round-trips overlap, so the grid populates in
   a few seconds instead of a minute. */
const WINDOW = 60000;
const MAX_PER_WINDOW = 59;   // safety margin under 60/min
const MIN_SPACING = 70;      // ms between starts (~14/sec, under burst limits)
let callTimes = [];          // start timestamps within the rolling window
let queue = [];
let lastStart = 0;
let pumping = false;
const inflight = {};          // path -> Promise (de-dupe identical concurrent calls)

function enqueue(fn) {
  return new Promise((res, rej) => { queue.push({ fn, res, rej }); pump(); });
}
async function pump() {
  if (pumping) return;
  pumping = true;
  while (queue.length) {
    const now = Date.now();
    callTimes = callTimes.filter(t => now - t < WINDOW);
    if (callTimes.length >= MAX_PER_WINDOW) {
      await sleep(WINDOW - (now - callTimes[0]) + 25);
      continue;
    }
    const sinceLast = now - lastStart;
    if (sinceLast < MIN_SPACING) { await sleep(MIN_SPACING - sinceLast); continue; }
    const job = queue.shift();
    lastStart = Date.now();
    callTimes.push(lastStart);
    runJob(job);               // fire-and-forget => true concurrency
  }
  pumping = false;
}
async function runJob({ fn, res, rej }) {
  for (let attempt = 0; attempt < 3; attempt++) {
    try { res(await fn()); return; }
    catch (e) {
      if (e.message === "RATE_LIMIT" && attempt < 2) { await sleep(1500 * (attempt + 1)); continue; }
      rej(e); return;
    }
  }
}

async function fhRaw(path, key) {
  const url = `https://finnhub.io/api/v1/${path}${path.includes("?") ? "&" : "?"}token=${encodeURIComponent(key)}`;
  const r = await fetch(url);
  if (r.status === 429) throw new Error("RATE_LIMIT");
  if (r.status === 401 || r.status === 403) throw new Error("AUTH");
  if (!r.ok) throw new Error("HTTP_" + r.status);
  return r.json();
}
function fh(path, key, ttl) {
  const c = getCache(path);
  if (c) return Promise.resolve(c);
  if (inflight[path]) return inflight[path];          // share an in-flight request
  const p = enqueue(() => fhRaw(path, key))
    .then(d => { setCache(path, d, ttl); return d; })
    .finally(() => { delete inflight[path]; });
  inflight[path] = p;
  return p;
}

const fmtPrice = (v) => (v == null || isNaN(v)) ? "—" : "$" + Number(v).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtPct = (v) => (v == null || isNaN(v)) ? "—" : (v >= 0 ? "+" : "") + Number(v).toFixed(2) + "%";
const fmtNum = (v, d=2) => (v == null || isNaN(v)) ? "—" : Number(v).toFixed(d);
function fmtCap(millions) {
  if (millions == null || isNaN(millions) || millions <= 0) return "—";
  const v = millions * 1e6;
  if (v >= 1e12) return "$" + (v/1e12).toFixed(2) + "T";
  if (v >= 1e9)  return "$" + (v/1e9).toFixed(2) + "B";
  if (v >= 1e6)  return "$" + (v/1e6).toFixed(2) + "M";
  return "$" + v.toFixed(0);
}
function fmtBigDollar(v) {
  if (v == null || isNaN(v) || v === 0) return "—";
  const a = Math.abs(v);
  if (a >= 1e9) return "$" + (v/1e9).toFixed(2) + "B";
  if (a >= 1e6) return "$" + (v/1e6).toFixed(1) + "M";
  if (a >= 1e3) return "$" + (v/1e3).toFixed(0) + "K";
  return "$" + v.toFixed(2);
}
function relTime(unixSec) {
  const diff = Date.now()/1000 - unixSec;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  if (diff < 7*86400) return Math.floor(diff/86400) + "d ago";
  return new Date(unixSec*1000).toLocaleDateString("en-US",{ month:"short", day:"numeric" });
}
const ymd = (date) => date.toISOString().slice(0,10);
const colorFor = (v) => v == null ? "text-mute" : v >= 0 ? "text-up" : "text-down";

function peFromMetric(m) {

/* ------------------------------------------------------------------ */
/*  TRADINGVIEW LINE CHART (official tv.js widget loader)             */
/* ------------------------------------------------------------------ */
// Uses TradingView's tv.js library (loaded in <head>) which is the most
// reliable way to embed programmatically. style:"2" = line chart. The widget
// has its own bottom range tabs (1D / 5D / 1M / 3M / 6M / YTD / 1Y / 5Y / All).
let _tvSeq = 0;
function TVChart({ symbol }) {
  const ref = useRef(null);
  const [failed, setFailed] = useState(false);
  useEffect(() => {
    let cancelled = false;
    let tries = 0;
    setFailed(false);
    const id = "tv_" + (++_tvSeq);
    function build() {
      if (cancelled || !ref.current) return;
      if (!(window.TradingView && window.TradingView.widget)) {
        if (tries++ > 60) { setFailed(true); return; }   // ~9s of polling
        setTimeout(build, 150);
        return;
      }
      ref.current.innerHTML = "";
      const host = document.createElement("div");
      host.id = id;
      host.style.height = "100%";
      host.style.width = "100%";
      ref.current.appendChild(host);
      try {
        new window.TradingView.widget({
          container_id: id,
          symbol: symbol,
          interval: "D",
          timezone: "Etc/UTC",
          theme: "dark",
          style: "2",                 // 2 = line
          locale: "en",
          autosize: true,
          withdateranges: true,       // bottom range tabs
          hide_side_toolbar: true,
          hide_top_toolbar: false,
          hide_legend: false,
          allow_symbol_change: false,
          save_image: false,
          backgroundColor: "rgba(15,15,15,1)",
          gridColor: "rgba(40,40,40,0.5)",
          toolbar_bg: "#0f0f0f",
          overrides: {
            "mainSeriesProperties.style": 2,
            "mainSeriesProperties.lineStyle.color": "#76B900",
            "mainSeriesProperties.lineStyle.linewidth": 2,
            "paneProperties.background": "#0f0f0f",
            "paneProperties.backgroundType": "solid",
            "paneProperties.vertGridProperties.color": "#1c1c1c",
            "paneProperties.horzGridProperties.color": "#1c1c1c",
            "scalesProperties.textColor": "#8a8a8a",
            "scalesProperties.lineColor": "#242424",
          },
        });
      } catch (e) { setFailed(true); }
    }
    build();
    return () => { cancelled = true; };
  }, [symbol]);

  return (
    <div className="w-full h-full relative">
      <div ref={ref} className="w-full h-full" />
      {failed && (
        <div className="absolute inset-0 flex flex-col items-center justify-center text-center gap-2 bg-panel">
          <div className="text-[12px] text-mute">Chart couldn't load here (third-party embeds may be blocked in this view).</div>
          <a href={`https://www.tradingview.com/chart/?symbol=${encodeURIComponent(symbol)}`} target="_blank" rel="noopener"
             className="text-[12px] text-nv hover:underline">Open {symbol} on TradingView ↗</a>
        </div>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  COMPANY DETAIL VIEW                                               */
/* ------------------------------------------------------------------ */
function Stat({ label, children }) {
  return (
    <div className="border border-line bg-panel rounded-md px-3 py-2.5">
      <div className="text-[10px] uppercase tracking-wide text-mute-2 font-semibold">{label}</div>
      <div className="font-mono text-sm mt-1 tabular">{children}</div>
    </div>
  );
}

function DetailView({ ticker, quote, metric, apiKey, onBack }) {
  const co = BY_TICKER[ticker];
  const [news, setNews] = useState(null);
  const [newsErr, setNewsErr] = useState(null);

  useEffect(() => {
    let alive = true;
    setNews(null); setNewsErr(null);
    const to = new Date(); const from = new Date(); from.setDate(from.getDate() - 30);
    fh(`company-news?symbol=${ticker}&from=${ymd(from)}&to=${ymd(to)}`, apiKey, TTL.news)
      .then(d => { if (alive) setNews(Array.isArray(d) ? d.slice(0, 12) : []); })
      .catch(e => { if (alive) setNewsErr(e.message); });
    return () => { alive = false; };
  }, [ticker, apiKey]);

  const pe = peFromMetric(metric);
  const dp = quote?.dp;

  return (
    <div className="fade-up">
      <button onClick={onBack} className="text-[12px] text-mute hover:text-nv transition-colors mb-4 inline-flex items-center gap-1.5">
        <span className="text-base leading-none">←</span> Back to ecosystem
      </button>

      <div className="flex flex-wrap items-end justify-between gap-4 mb-5">
        <div>
          <div className="flex items-center gap-3">
            <h1 className="font-mono text-3xl font-bold tracking-tight">{co.t}</h1>
            <span className="text-[10px] font-semibold uppercase tracking-[0.14em] text-nv border border-nv/30 rounded px-2 py-0.5">{co.c}</span>
          </div>
          <div className="text-mute text-sm mt-1">{co.n}</div>
        </div>
        <div className="text-right">
          <div className="font-mono text-3xl font-bold tabular">{quote ? fmtPrice(quote.c) : <Spinner/>}</div>
          {quote && <div className="text-sm font-semibold mt-0.5"><Pct v={dp}/> <span className="text-mute font-normal">({quote.d >= 0 ? "+" : ""}{fmtNum(quote.d)})</span></div>}
        </div>
      </div>

      <div className="border border-line bg-panel/60 rounded-lg p-3.5 mb-5">
        <div className="text-[10px] uppercase tracking-[0.14em] text-nv font-bold mb-1.5">Role in NVIDIA supply chain</div>
        <p className="text-sm text-ink/85 leading-relaxed">{co.r}</p>
      </div>

      {/* Chart */}
      <div className="border border-line bg-panel rounded-lg overflow-hidden mb-5">
        <div className="flex items-center justify-between px-3.5 pt-3">
          <div className="text-[11px] uppercase tracking-[0.14em] text-mute-2 font-semibold">Price</div>
          <div className="text-[10px] text-mute-2 font-mono hidden sm:block">range buttons on chart →</div>
        </div>
        <div className="h-[340px] sm:h-[400px] mt-2 px-1.5 pb-1.5">
          <TVChart symbol={co.tv} />
        </div>
      </div>

      {/* Fundamentals */}
      <div className="text-[11px] uppercase tracking-[0.14em] text-mute-2 font-semibold mb-2.5">Key Fundamentals</div>
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5 mb-6">
        <Stat label="Market Cap">{metric ? fmtCap(metric.marketCapitalization) : <Spinner/>}</Stat>
        <Stat label="P/E (TTM)">{metric ? (pe ? fmtNum(pe,1) : "—") : <Spinner/>}</Stat>
        <Stat label="YTD">{metric ? <Pct v={metric.yearToDatePriceReturnDaily}/> : <Spinner/>}</Stat>
        <Stat label="1Y Return">{metric ? <Pct v={metric["52WeekPriceReturnDaily"]}/> : <Spinner/>}</Stat>
        <Stat label="52W High">{metric ? fmtPrice(metric["52WeekHigh"]) : <Spinner/>}</Stat>
        <Stat label="52W Low">{metric ? fmtPrice(metric["52WeekLow"]) : <Spinner/>}</Stat>
        <Stat label="Day Range">{quote ? `${fmtNum(quote.l)} – ${fmtNum(quote.h)}` : <Spinner/>}</Stat>
        <Stat label="Prev Close">{quote ? fmtPrice(quote.pc) : <Spinner/>}</Stat>
        <Stat label="Open">{quote ? fmtPrice(quote.o) : <Spinner/>}</Stat>
        <Stat label="EPS (TTM)">{metric ? fmtNum(metric.epsTTM ?? metric.epsBasicExclExtraItemsTTM) : <Spinner/>}</Stat>
        <Stat label="Div Yield">{metric ? (metric.currentDividendYieldTTM != null ? fmtNum(metric.currentDividendYieldTTM,2)+"%" : "—") : <Spinner/>}</Stat>
        <Stat label="Beta">{metric ? fmtNum(metric.beta) : <Spinner/>}</Stat>
      </div>

      {/* News */}
      <div className="text-[11px] uppercase tracking-[0.14em] text-mute-2 font-semibold mb-2.5">Recent News · {co.t}</div>
      <div className="space-y-2">
        {news == null && !newsErr && <div className="text-mute text-sm flex items-center gap-2"><Spinner/> Loading news…</div>}
        {newsErr && <div className="text-down/80 text-sm">Couldn't load news ({newsErr === "AUTH" ? "endpoint not available on your plan" : newsErr === "RATE_LIMIT" ? "rate limited, try again shortly" : newsErr}).</div>}
        {news && news.length === 0 && <div className="text-mute text-sm">No recent headlines.</div>}
        {news && news.map((item, i) => <NewsRow key={item.id || i} item={{...item, _ticker: co.t}} compact />)}
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  NEWS ROW                                                          */
/* ------------------------------------------------------------------ */
function NewsRow({ item, compact }) {
  return (
    <a href={item.url} target="_blank" rel="noopener noreferrer"
       className="block border border-line bg-panel hover:bg-panel-2 hover:border-line-2 rounded-md px-3.5 py-3 transition-colors group">
      <div className="flex items-start gap-3">
        <span className="shrink-0 mt-0.5 font-mono text-[10px] font-bold text-nv border border-nv/30 rounded px-1.5 py-0.5">{item._ticker}</span>
        <div className="min-w-0 flex-1">
          <div className="text-[13.5px] text-ink/90 group-hover:text-ink leading-snug font-medium">{item.headline}</div>
          <div className="flex items-center gap-2 mt-1.5 text-[11px] text-mute-2">
            <span className="truncate max-w-[160px]">{item.source}</span>
            <span>·</span>
            <span className="font-mono">{relTime(item.datetime)}</span>
            <span className="ml-auto text-nv/50 group-hover:text-nv transition-colors">↗</span>
          </div>
        </div>
      </div>
    </a>
  );
}

/* ------------------------------------------------------------------ */
/*  NEWS FEED (aggregate, lazy-loaded)                                */
/* ------------------------------------------------------------------ */
function NewsFeed({ apiKey, active }) {
  const [items, setItems] = useState([]);
  const [progress, setProgress] = useState({ done: 0, total: TICKERS.length });
  const [loading, setLoading] = useState(false);
  const [started, setStarted] = useState(false);
  const [filter, setFilter] = useState("ALL");

  useEffect(() => {
    if (!active || started) return;
    setStarted(true); setLoading(true);
    const to = new Date(); const from = new Date(); from.setDate(from.getDate() - 10);
    const fromS = ymd(from), toS = ymd(to);
    let collected = [];
    let done = 0;
    const tasks = TICKERS.map(t =>
      fh(`company-news?symbol=${t}&from=${fromS}&to=${toS}`, apiKey, TTL.news)
        .then(d => {
          if (Array.isArray(d)) {
            const tagged = d.slice(0, 6).map(x => ({ ...x, _ticker: t, _cat: BY_TICKER[t].c }));
            collected = collected.concat(tagged);
            collected.sort((a,b) => b.datetime - a.datetime);
            setItems([...collected]);
          }
        })
        .catch(() => {})
        .finally(() => { done++; setProgress({ done, total: TICKERS.length }); })
    );
    Promise.allSettled(tasks).then(() => setLoading(false));
  }, [active, started, apiKey]);

  const filtered = useMemo(() => {
    let arr = items;
    if (filter !== "ALL") {
      if (filter.startsWith("CAT:")) { const c = filter.slice(4); arr = items.filter(i => i._cat === c); }
      else arr = items.filter(i => i._ticker === filter);
    }
    return arr.slice(0, 120);
  }, [items, filter]);

  return (
    <div className="fade-up">
      <div className="flex flex-wrap items-center gap-3 mb-4">
        <h1 className="text-lg font-bold">Ecosystem News</h1>
        {loading && <span className="text-[11px] text-mute-2 flex items-center gap-1.5"><Spinner/> {progress.done}/{progress.total} feeds</span>}
        <div className="ml-auto">
          <select value={filter} onChange={e => setFilter(e.target.value)}
            className="bg-panel border border-line rounded-md text-[12px] px-2.5 py-1.5 text-ink focus:outline-none focus:border-nv/50">
            <option value="ALL">All companies</option>
            <optgroup label="By category">
              {CATEGORY_ORDER.map(c => <option key={c} value={"CAT:"+c}>{c}</option>)}
            </optgroup>
            <optgroup label="By company">
              {COMPANIES.map(c => <option key={c.t} value={c.t}>{c.t} — {c.n}</option>)}
            </optgroup>
          </select>
        </div>
      </div>
      <div className="space-y-2">
        {filtered.length === 0 && !loading && <div className="text-mute text-sm">No headlines found.</div>}
        {filtered.length === 0 && loading && <div className="text-mute text-sm flex items-center gap-2"><Spinner/> Fetching headlines (throttled to respect Finnhub limits)…</div>}
        {filtered.map((item, i) => <NewsRow key={(item.id||"") + i} item={item} />)}
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  EARNINGS CALENDAR                                                 */
/* ------------------------------------------------------------------ */
const HOUR_LABEL = { bmo: "BMO", amc: "AMC", dmh: "During", "": "—" };
function EarningsCalendar({ apiKey, active, earnings, error }) {
  const within7 = (dateStr) => {
    const d = new Date(dateStr + "T00:00:00");
    const now = new Date(); now.setHours(0,0,0,0);
    const diff = (d - now) / 86400e3;
    return diff >= 0 && diff < 7;
  };

  return (
    <div className="fade-up">
      <div className="flex items-center gap-3 mb-4">
        <h1 className="text-lg font-bold">Earnings Calendar</h1>
        <span className="text-[11px] text-mute-2">next ~45 days · tracked tickers</span>
        {!earnings && !error && <Spinner className="ml-1" />}
      </div>

      {error && <div className="text-down/80 text-sm border border-down/20 bg-down/5 rounded-md px-3 py-2.5">
        Earnings calendar unavailable ({error === "AUTH" ? "this Finnhub endpoint isn't on your current plan" : error}).
      </div>}

      {earnings && earnings.length === 0 && <div className="text-mute text-sm">No upcoming earnings found for tracked tickers.</div>}

      {earnings && earnings.length > 0 && (
        <div className="border border-line rounded-lg overflow-hidden">
          <div className="grid grid-cols-[88px_64px_1fr_64px_88px_96px] gap-2 px-3.5 py-2.5 bg-panel-2 text-[10px] uppercase tracking-wide text-mute-2 font-semibold">
            <div>Date</div><div>Ticker</div><div className="hidden sm:block">Company</div><div className="sm:hidden">Co.</div><div>Time</div><div className="text-right">EPS est</div><div className="text-right">Rev est</div>
          </div>
          {earnings.map((e, i) => {
            const soon = within7(e.date);
            return (
              <div key={e.symbol + e.date + i}
                className={"grid grid-cols-[88px_64px_1fr_64px_88px_96px] gap-2 px-3.5 py-2.5 text-[12.5px] items-center border-t border-line " +
                  (soon ? "bg-nv/5 border-l-2 border-l-nv" : "")}>
                <div className="font-mono text-mute tabular">{new Date(e.date+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                <div className="font-mono font-bold text-nv flex items-center gap-1.5">
                  {e.symbol}{soon && <span className="hidden sm:inline text-[8px] text-nv/70 font-semibold border border-nv/30 rounded px-1">7D</span>}
                </div>
                <div className="text-mute truncate">{BY_TICKER[e.symbol]?.n || ""}</div>
                <div className="font-mono text-[11px] text-mute-2">{HOUR_LABEL[e.hour] || "—"}</div>
                <div className="font-mono text-right tabular text-ink/80">{e.epsEstimate != null ? e.epsEstimate.toFixed(2) : "—"}</div>
                <div className="font-mono text-right tabular text-ink/80">{fmtBigDollar(e.revenueEstimate)}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  API KEY GATE                                                      */
/* ------------------------------------------------------------------ */
function KeyGate({ onSubmit }) {
  const [k, setK] = useState(DEFAULT_KEY);
  return (
    <div className="max-w-md mx-auto mt-24 fade-up">
      <div className="border border-line bg-panel rounded-xl p-6">
        <div className="flex items-center gap-2 mb-1">
          <div className="w-2.5 h-2.5 rounded-sm bg-nv" />
          <h1 className="text-lg font-bold">NVIDIA Ecosystem Tracker</h1>
        </div>
        <p className="text-[13px] text-mute leading-relaxed mb-4">
          Enter a Finnhub API key to load live quotes, fundamentals, news, and earnings.
          A free key works ( <a href="https://finnhub.io/register" target="_blank" rel="noopener" className="text-nv hover:underline">finnhub.io/register</a> ).
        </p>
        <input value={k} onChange={e => setK(e.target.value)} spellCheck={false}
          className="w-full bg-bg border border-line rounded-md px-3 py-2.5 font-mono text-[12px] text-ink focus:outline-none focus:border-nv/60 mb-3"
          placeholder="Finnhub API key" />
        <button onClick={() => k.trim() && onSubmit(k.trim())}
          className="w-full bg-nv text-black font-semibold text-sm rounded-md py-2.5 hover:bg-nv-dim transition-colors">
          Load dashboard
        </button>
        <p className="text-[10px] text-mute-2 mt-3 leading-relaxed">
          Calls are throttled (~54/min) and cached 5–30 min to stay under the free tier's 60/min limit. The key is kept only in memory for this session.
        </p>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  ROOT APP                                                          */
/* ------------------------------------------------------------------ */
function App() {
  const [apiKey, setApiKey] = useState(DEFAULT_KEY); // auto-loads with embedded key
  const [view, setView] = useState("grid"); // grid | detail | news | earnings
  const [selected, setSelected] = useState(null);

  const [nvda, setNvda] = useState(null);
  const [quotes, setQuotes] = useState({});
  const [metrics, setMetrics] = useState({});
  const [earnings, setEarnings] = useState(null);
  const [earnErr, setEarnErr] = useState(null);
  const [loadErr, setLoadErr] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [newsTabOpened, setNewsTabOpened] = useState(false);

  const loadAll = useCallback((key) => {
    setRefreshing(true); setLoadErr(null);
    // Priority 1: NVDA headline quote + earnings calendar (both feed the KPI bar)
    fh(`quote?symbol=NVDA`, key, TTL.quote).then(setNvda).catch(e => { if (e.message === "AUTH") setLoadErr("AUTH"); });
    const to = new Date(); to.setDate(to.getDate() + 45);
    fh(`calendar/earnings?from=${ymd(new Date())}&to=${ymd(to)}`, key, TTL.earn)
      .then(d => {
        const arr = (d?.earningsCalendar || [])
          .filter(e => TICKERS.includes(e.symbol))
          .sort((a,b) => a.date.localeCompare(b.date));
        const seen = new Set(); const out = [];
        for (const e of arr) { const k2 = e.symbol+e.date; if (!seen.has(k2)) { seen.add(k2); out.push(e); } }
        setEarnings(out);
      })
      .catch(e => setEarnErr(e.message));
    // Priority 2: all card prices (paint fast)
    TICKERS.forEach(t => {
      fh(`quote?symbol=${t}`, key, TTL.quote)
        .then(d => setQuotes(p => ({ ...p, [t]: d })))
        .catch(e => { if (e.message === "AUTH") setLoadErr("AUTH"); });
    });
    // Priority 3: fundamentals (fill in behind the prices)
    TICKERS.forEach(t => {
      fh(`stock/metric?symbol=${t}&metric=all`, key, TTL.metric)
        .then(d => setMetrics(p => ({ ...p, [t]: d?.metric || {} })))
        .catch(() => {});
    });

    setLastUpdated(new Date());
    setTimeout(() => setRefreshing(false), 800);
  }, []);

  useEffect(() => { if (apiKey) loadAll(apiKey); }, [apiKey, loadAll]);

  const handleRefresh = () => { clearCache(); setNvda(null); setQuotes({}); setMetrics({}); setEarnings(null); setEarnErr(null); loadAll(apiKey); };
  const select = (t) => { setSelected(t); setView("detail"); };

  const earningsThisWeek = useMemo(() => {
    if (!earnings) return null;
    const now = new Date(); now.setHours(0,0,0,0);
    const set = new Set();
    earnings.forEach(e => { const d = new Date(e.date+"T00:00:00"); const diff = (d-now)/86400e3; if (diff>=0 && diff<7) set.add(e.symbol); });
    return set.size;
  }, [earnings]);

  if (!apiKey) return <KeyGate onSubmit={setApiKey} />;

  const NavBtn = ({ id, label }) => (
    <button onClick={() => { if (id==="news") setNewsTabOpened(true); setView(id); if (id!=="detail") setSelected(null); }}
      className={"text-[12.5px] font-semibold px-3 py-1.5 rounded-md transition-colors " +
        ((view === id || (id==="grid" && view==="detail")) ? "bg-panel-2 text-nv" : "text-mute hover:text-ink")}>
      {label}
    </button>
  );

  return (
    <div className="min-h-screen max-w-[1400px] mx-auto px-4 sm:px-6 py-5">
      {/* Header */}
      <header className="flex items-center gap-3 mb-4 flex-wrap">
        <div className="flex items-center gap-2.5">
          <div className="w-3 h-3 rounded-sm bg-nv shadow-[0_0_12px_rgba(118,185,0,0.6)]" />
          <h1 className="text-[15px] font-extrabold tracking-tight">NVIDIA <span className="text-nv">Ecosystem</span> Tracker</h1>
        </div>
        <nav className="flex items-center gap-1 ml-1 sm:ml-4">
          <NavBtn id="grid" label="Ecosystem" />
          <NavBtn id="news" label="News" />
          <NavBtn id="earnings" label="Earnings" />
        </nav>
        <div className="ml-auto flex items-center gap-3">
          {lastUpdated && <span className="hidden sm:block text-[10px] text-mute-2 font-mono">upd {lastUpdated.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</span>}
          <button onClick={handleRefresh} disabled={refreshing}
            className="text-[11px] font-semibold border border-line rounded-md px-2.5 py-1.5 text-mute hover:text-nv hover:border-nv/40 transition-colors flex items-center gap-1.5 disabled:opacity-50">
            {refreshing ? <Spinner/> : <span>↻</span>} Refresh
          </button>
        </div>
      </header>

      {loadErr === "AUTH" && (
        <div className="border border-down/30 bg-down/5 text-down/90 text-[12.5px] rounded-md px-3 py-2.5 mb-4">
          Finnhub rejected the API key (401/403). Reload the page to enter a different key.
        </div>
      )}

      <div className="mb-6"><KpiBar nvda={nvda} quotes={quotes} metrics={metrics} earningsThisWeek={earningsThisWeek} /></div>

      {view === "grid" && (
        <div className="fade-up">
          {CATEGORY_ORDER.map(cat => (
            <CategorySection key={cat} cat={cat} quotes={quotes} metrics={metrics} onSelect={select} />
          ))}
          <div className="text-[10px] text-mute-2 leading-relaxed border-t border-line pt-4 mt-2">
            Data: Finnhub (quotes, fundamentals, news, earnings) · charts via TradingView. Fundamentals fill in progressively as throttled requests complete. Not investment advice.
          </div>
        </div>
      )}

      {view === "detail" && selected && (
        <DetailView ticker={selected} quote={quotes[selected]} metric={metrics[selected]} apiKey={apiKey} onBack={() => setView("grid")} />
      )}

      {view === "news" && <NewsFeed apiKey={apiKey} active={newsTabOpened || view==="news"} />}

      {view === "earnings" && <EarningsCalendar apiKey={apiKey} active earnings={earnings} error={earnErr} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
